<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance</title>
    {% include 'bootstrap.css.frag' %}
    <style>
        table {
            border-collapse: collapse;
            border: 2px solid rgb(140 140 140);
        }

        th,
        td {
            border: 1px solid rgb(160 160 160);
            padding: 8px 10px;
        }

        tbody>tr>th {
            background-color: rgb(201, 201, 201);
        }

        tr:has(th) {
            z-index: 1;
            position: sticky;
            /* 0px if you don't have a navbar, but something is required */
            top: 0px;
        }
    </style>
</head>

<body>
    {% include 'header.frag.html' %}

    <main>
        <div class="container">
            <div class="container">
                {% include 'flashed_messages.frag.html' %}
                
                <nav class="mb-3">
                    <span class="me-2">Year:</span>
                    {% for year in available_years %}
                        {% if year == current_year %}
                            <strong class="me-2">{{ year }}</strong>
                        {% else %}
                            <a href="?year={{ year }}" class="me-2">{{ year }}</a>
                        {% endif %}
                    {% endfor %}
                </nav>

                <form id="add-entry-form" action="/api/entries/create" method="post">
                    <label>UserID
                    <input id="add-user-search" list="user-options" autocomplete="off" required>
                    <input id="add-user" name="userid" type="hidden">
                    <datalist id="user-options">
                        {% for user in users %}
                        <option value="{{ user.displayName() }} (#{{ user.user }})" data-userid="{{ user.user }}"></option>
                        {% endfor %}
                    </datalist>
                    </label>
                    <input id="add-start" name="startedAt" type="datetime-local" value="">
                    <input id="add-end" name="endedAt" type="datetime-local" value="">
                    <input id="add-info" name="info" type="text" placeholder="Info (optional)">
                    <button type="submit" class="btn btn-outline-success">Add time</button>
                </form>
                <table>
                    <thead>
                        <tr>
                            <th scope="col">Name</th>
                            <th scope="col">Started At</th>
                            <th scope="col">Ended At</th>
                            <th scope="col">Info</th>
                            <th scope="col" colspan="3">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        {{tableBody|safe}}
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        function toDateInputValue(dateObject){
            const local = new Date(dateObject);
            local.setMinutes(dateObject.getMinutes() - dateObject.getTimezoneOffset());
            return local.toJSON().slice(0,19);
        };

        const params = new URLSearchParams(window.location.search);
        if (params.has('startedAt')) {
            document.getElementById('add-start').value = params.get('startedAt');
        } else {
            let now = new Date();
            now.setMilliseconds(0);
            now.setSeconds(0);
            document.getElementById('add-start').value = toDateInputValue(now);
        }
        if (params.has('endedAt')) {
            document.getElementById('add-end').value = params.get('endedAt');
        } else {
            let now = new Date();
            now.setMilliseconds(0);
            now.setSeconds(0);
            document.getElementById('add-end').value = toDateInputValue(now);
        }

        const addEntryForm = document.getElementById("add-entry-form");
        const addUserSearch = document.getElementById("add-user-search");
        const addUser = document.getElementById("add-user");
        const userOptions = Array.from(document.querySelectorAll("#user-options option"));

        function syncAddUserId() {
            const value = addUserSearch.value.trim();
            const selected = userOptions.find(option => option.value === value);
            const userIdMatch = userOptions.find(option => option.dataset["userid"] === value);

            if (selected || userIdMatch) {
                addUser.value = (selected || userIdMatch).dataset["userid"];
                addUserSearch.setCustomValidity("");
                return true;
            }

            addUser.value = "";
            addUserSearch.setCustomValidity("Choose a user from the list.");
            return false;
        }

        addUserSearch.addEventListener("input", syncAddUserId);
        addEntryForm.addEventListener("submit", (event) => {
            if (!syncAddUserId()) {
                event.preventDefault();
                addUserSearch.reportValidity();
            }
        });

        async function updateEntry(element) {
            let tr = element.parentElement.parentElement
            let id = parseInt(tr.dataset["id"])
            let body = {
                id: id,
                startedAt: tr.querySelector('input[name="startedAt"]')?.value,
                endedAt: tr.querySelector('input[name="endedAt"]')?.value,
            }
            await fetch("/api/entries/update", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) })
            location.reload()
        }

        async function deleteEntry(element) {
            let tr = element.parentElement.parentElement
            let id = parseInt(tr.dataset["id"]) 
            let body = {
                id: id,
            }
            await fetch("/api/entries/delete", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) })
            location.reload()
        }

        async function clearEndEntry(element) {
            let tr = element.parentElement.parentElement
            let id = parseInt(tr.dataset["id"]) 
            let body = {
                id: id,
                startedAt: tr.querySelector('input[name="startedAt"]')?.value,
                endedAt: null,
            }
            await fetch("/api/entries/update", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) })
            location.reload()
        }
    </script>
</body>

</html>
